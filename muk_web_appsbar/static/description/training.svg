<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1A2F5A"/>
<stop offset="100%" stop-color="#0A1633"/>
</linearGradient>

<linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#223D75"/>
<stop offset="100%" stop-color="#132754"/>
</linearGradient>

<linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#35D0FF"/>
<stop offset="100%" stop-color="#0A4DFF"/>
</linearGradient>

</defs>

<!-- panel -->
<rect x="10" y="10" width="80" height="80" rx="18"
fill="url(#panelGrad)"/>

<!-- video screen -->
<rect x="24" y="28" width="52" height="40" rx="10"
fill="url(#videoGrad)"
stroke="url(#accentGrad)"
stroke-width="1.4"/>

<!-- play button -->
<polygon points="46,38 46,58 64,48"
fill="url(#accentGrad)"/>

<!-- timeline bar -->
<rect x="30" y="62" width="40" height="3" rx="1.5" fill="#35D0FF"/>
<rect x="30" y="62" width="18" height="3" rx="1.5" fill="#7FE6FF"/>

<!-- learning dots (users progress) -->
<circle cx="30" cy="74" r="2.2" fill="#35D0FF"/>
<circle cx="40" cy="74" r="2.2" fill="#7FE6FF"/>
<circle cx="50" cy="74" r="2.2" fill="#35D0FF"/>
<circle cx="60" cy="74" r="2.2" fill="#7FE6FF"/>

<!-- highlight -->
<circle cx="70" cy="30" r="2.5" fill="#35D0FF"/>

</svg>