<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="pipeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#35D0FF"/>
    <stop offset="100%" stop-color="#0A4DFF"/>
  </linearGradient>

  <linearGradient id="pipeGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0A4DFF"/>
    <stop offset="100%" stop-color="#35D0FF"/>
  </linearGradient>

  <linearGradient id="pipeLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1C2F66"/>
    <stop offset="50%" stop-color="#35D0FF"/>
    <stop offset="100%" stop-color="#1C2F66"/>
  </linearGradient>
</defs>

<!-- marco exterior futurista -->
<rect x="10" y="10" width="80" height="80" rx="18" fill="#0F1C3F"/>

<!-- nodos del pipeline -->
<rect x="18" y="28" width="18" height="18" rx="6" fill="url(#pipeGrad1)"/>
<rect x="41" y="41" width="18" height="18" rx="6" fill="#1B2B5C"/>
<rect x="64" y="54" width="18" height="18" rx="6" fill="url(#pipeGrad2)"/>

<!-- conexiones -->
<path d="M36 37 L41 37 C45 37 45 41 45 41" fill="none" stroke="url(#pipeLine)" stroke-width="5" stroke-linecap="round"/>
<path d="M59 50 L64 50 C68 50 68 54 68 54" fill="none" stroke="url(#pipeLine)" stroke-width="5" stroke-linecap="round"/>

<!-- acentos tech -->
<rect x="22" y="32" width="10" height="3" rx="1.5" fill="#D8F7FF" opacity="0.9"/>
<rect x="45" y="46" width="10" height="3" rx="1.5" fill="#35D0FF" opacity="0.95"/>
<rect x="68" y="59" width="10" height="3" rx="1.5" fill="#D8F7FF" opacity="0.9"/>

<!-- indicador de avance -->
<path d="M31 67 C39 74 52 77 67 73" fill="none" stroke="#35D0FF" stroke-width="3.2" stroke-linecap="round" opacity="0.9"/>
<circle cx="69.5" cy="72.5" r="2.8" fill="#35D0FF"/>

</svg>
