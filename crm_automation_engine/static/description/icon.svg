<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="">
<defs>
  <linearGradient id="panelGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1A2F5A"/>
    <stop offset="100%" stop-color="#0A1633"/>
  </linearGradient>
  <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#35D0FF"/>
    <stop offset="100%" stop-color="#0A4DFF"/>
  </linearGradient>
</defs>

<!-- panel background -->
<rect x="10" y="10" width="80" height="80" rx="18" fill="url(#panelGrad2)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- large gear (back) -->
<g transform="translate(44,48)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <path d="&#10;    M-4,-18 L4,-18&#10;    L5,-13 Q10,-11 14,-8 L19,-10 L24,-5&#10;    L22,-0 Q24,5 23,10 L18,13&#10;    Q16,18 12,21 L13,26 L8,30&#10;    L3,28 Q-2,30 -7,29 L-10,25&#10;    Q-15,23 -18,19 L-23,20 L-27,14&#10;    L-25,9 Q-27,4 -26,-1 L-21,-4&#10;    Q-19,-9 -15,-13 L-16,-18&#10;    L-11,-22 L-6,-20 Z" fill="#223D75" stroke="url(#gearGrad)" stroke-width="1.4" fill-rule="evenodd" style="fill:rgb(34, 61, 117);color:rgb(255, 255, 255);stroke-width:1.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- gear hole -->
  <circle cx="0" cy="4" r="7" fill="#0A1633" stroke="url(#gearGrad)" stroke-width="1.2" style="fill:rgb(10, 22, 51);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- small gear (front-right) -->
<g transform="translate(66,62)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <path d="&#10;    M-2,-11 L2,-11&#10;    L3,-8 Q6,-7 8,-5 L11,-6 L14,-3&#10;    L13,-0 Q14,3 13,6 L10,8&#10;    Q9,11 6,13 L7,16 L4,18&#10;    L1,17 Q-2,18 -5,17 L-7,15&#10;    Q-10,13 -11,10 L-14,10 L-16,7&#10;    L-15,4 Q-16,1 -15,-2 L-12,-4&#10;    Q-11,-7 -8,-9 L-9,-11&#10;    L-6,-13 L-3,-12 Z" fill="#1A2F5A" stroke="url(#gearGrad)" stroke-width="1.2" fill-rule="evenodd" style="fill:rgb(26, 47, 90);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="0" cy="3" r="4" fill="#0A1633" stroke="url(#gearGrad)" stroke-width="1" style="fill:rgb(10, 22, 51);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- lightning bolt (automation symbol) -->
<path d="M46 24 L38 44 L46 44 L40 62 L58 38 L48 38 L55 24 Z" fill="url(#gearGrad)" opacity="0.95" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- highlight dot -->
<circle cx="66" cy="28" r="2.5" fill="#35D0FF" style="fill:rgb(53, 208, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>