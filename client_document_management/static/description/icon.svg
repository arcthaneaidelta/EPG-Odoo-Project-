<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1A2F5A"/>
<stop offset="100%" stop-color="#0A1633"/>
</linearGradient>

<linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#223D75"/>
<stop offset="100%" stop-color="#132754"/>
</linearGradient>

<linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#35D0FF"/>
<stop offset="100%" stop-color="#0A4DFF"/>
</linearGradient>

</defs>

<!-- panel -->
<rect x="10" y="10" width="80" height="80" rx="18"
fill="url(#panelGrad)"/>

<!-- document body -->
<rect x="28" y="22" width="44" height="56" rx="10"
fill="url(#docGrad)"
stroke="url(#accentGrad)"
stroke-width="1.4"/>

<!-- folded corner -->
<path d="M56 22 L72 22 L72 38 Z"
fill="#0E1F44"/>

<path d="M56 22 L72 38 L56 38 Z"
fill="url(#accentGrad)" opacity="0.9"/>

<!-- text lines -->
<rect x="34" y="40" width="32" height="3" rx="1.5" fill="#35D0FF"/>
<rect x="34" y="48" width="28" height="3" rx="1.5" fill="#7FE6FF"/>
<rect x="34" y="56" width="24" height="3" rx="1.5" fill="#35D0FF"/>
<rect x="34" y="64" width="20" height="3" rx="1.5" fill="#7FE6FF"/>

<!-- highlight dot -->
<circle cx="64" cy="30" r="2.5" fill="#35D0FF"/>

</svg>