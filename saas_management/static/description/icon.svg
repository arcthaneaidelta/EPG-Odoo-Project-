<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1A2F5A"/>
<stop offset="100%" stop-color="#0A1633"/>
</linearGradient>

<linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#223D75"/>
<stop offset="100%" stop-color="#132754"/>
</linearGradient>

<linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#35D0FF"/>
<stop offset="100%" stop-color="#0A4DFF"/>
</linearGradient>

</defs>

<!-- panel -->
<rect x="10" y="10" width="80" height="80" rx="18"
fill="url(#panelGrad)"/>

<!-- cloud -->
<path d="M35 58 
C30 58, 28 54, 30 50
C31 45, 36 44, 39 46
C41 41, 48 40, 52 44
C56 42, 62 45, 62 50
C66 50, 70 53, 70 58
C70 62, 66 65, 62 65
L36 65
C32 65, 30 62, 30 58 Z"
fill="url(#cloudGrad)"
stroke="url(#accentGrad)"
stroke-width="1.4"/>

<!-- nodes inside cloud -->
<circle cx="40" cy="55" r="2.5" fill="#35D0FF"/>
<circle cx="50" cy="55" r="2.5" fill="#7FE6FF"/>
<circle cx="60" cy="55" r="2.5" fill="#35D0FF"/>

<!-- connection lines -->
<line x1="42.5" y1="55" x2="47.5" y2="55"
stroke="#35D0FF" stroke-width="1.5"/>

<line x1="52.5" y1="55" x2="57.5" y2="55"
stroke="#35D0FF" stroke-width="1.5"/>

<!-- top SaaS signal -->
<line x1="50" y1="40" x2="50" y2="32"
stroke="#35D0FF" stroke-width="2"/>

<circle cx="50" cy="30" r="3" fill="#35D0FF"/>

<!-- glow accent -->
<circle cx="68" cy="30" r="2.5" fill="#35D0FF"/>

</svg>